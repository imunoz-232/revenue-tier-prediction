<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Revenue Prediction App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #2563eb;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .high { color: #22c55e; }
        .medium { color: #facc15; }
        .low { color: #ef4444; }
    </style>
</head>

<body>

<div class="container">
    <h2>Revenue Prediction</h2>

    <select id="product_category">
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Home">Home</option>
    </select>

    <input type="number" id="price" placeholder="Price">
    <input type="number" id="discount_percent" placeholder="Discount %">
    <input type="number" id="quantity_sold" placeholder="Quantity Sold">

    <select id="customer_region">
        <option value="North">North</option>
        <option value="South">South</option>
        <option value="West">West</option>
        <option value="East">East</option>
    </select>

    <select id="payment_method">
        <option value="Credit">Credit</option>
        <option value="Cash">Cash</option>
        <option value="Debit">Debit</option>
    </select>

    <input type="number" id="rating" placeholder="Rating">

    <button onclick="predict()">Predict</button>

    <div id="result" class="result"></div>
</div>

<script>
async function predict() {
    try {
        const data = {
            product_category: document.getElementById("product_category").value,
            price: Number(document.getElementById("price").value),
            discount_percent: Number(document.getElementById("discount_percent").value),
            quantity_sold: Number(document.getElementById("quantity_sold").value),
            customer_region: document.getElementById("customer_region").value,
            payment_method: document.getElementById("payment_method").value,
            rating: Number(document.getElementById("rating").value)
        };

        const response = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        const resultDiv = document.getElementById("result");
        const tier = result.predicted_revenue_tier;

        resultDiv.innerText = "Prediction: " + tier;
        resultDiv.className = "result " + tier.toLowerCase();

    } catch (error) {
        console.error(error);
        document.getElementById("result").innerText = "Error connecting to API ❌";
    }
}
</script>

</body>
</html>
